<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phantasy Star IV — Guide and Walkthrough</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root { --bg:#1a1a2e; --surface:#16213e; --text:#e0e0e0; --accent:#e94560; --border:#2a2a4a; --hover:#1f2f4f; --muted:#888; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:system-ui,sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; }
a { color:var(--accent); text-decoration:none; }
a:hover { text-decoration:underline; }

#sidebar { width:320px; min-width:320px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
#sidebar h1 { font-size:1rem; padding:12px 16px; border-bottom:1px solid var(--border); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#search { padding:8px 12px; border-bottom:1px solid var(--border); }
#search input { width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:6px; background:var(--bg); color:var(--text); font-size:0.9rem; }
#search input:focus { outline:none; border-color:var(--accent); }
#toc { flex:1; overflow-y:auto; padding:8px 0; }
.toc-item { display:block; padding:6px 16px; font-size:0.85rem; cursor:pointer; border-left:3px solid transparent; transition:all 0.15s; color:var(--muted); }
.toc-item:hover { background:var(--hover); color:var(--text); border-left-color:var(--accent); }
.toc-item.active { background:var(--hover); color:var(--text); border-left-color:var(--accent); font-weight:600; }
.toc-item.hidden { display:none; }
.toc-d0 { padding-left:16px; font-weight:600; }
.toc-d1 { padding-left:32px; }
.toc-d2 { padding-left:48px; }
.toc-d3 { padding-left:64px; }

#main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
#nav-top, #nav-bottom { display:flex; justify-content:space-between; align-items:center; padding:8px 16px; background:var(--surface); border-bottom:1px solid var(--border); min-height:44px; gap:8px; flex-shrink:0; }
#nav-bottom { border-top:1px solid var(--border); border-bottom:none; }
.nav-btn { padding:6px 14px; border:1px solid var(--border); border-radius:6px; background:var(--bg); color:var(--text); cursor:pointer; font-size:0.85rem; transition:all 0.15s; white-space:nowrap; }
.nav-btn:hover { background:var(--hover); border-color:var(--accent); }
.nav-btn:disabled { opacity:0.3; cursor:default; }
.nav-btn:disabled:hover { background:var(--bg); border-color:var(--border); }
#breadcrumb { font-size:0.8rem; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; text-align:center; }
#breadcrumb a { color:var(--muted); }
#breadcrumb span { color:var(--text); font-weight:600; }
#content { flex:1; overflow-y:auto; padding:20px 32px; max-width:900px; width:100%; margin:0 auto; }
#content h1 { font-size:1.6rem; margin:0 0 16px; color:var(--accent); border-bottom:1px solid var(--border); padding-bottom:8px; }
#content h2 { font-size:1.3rem; margin:24px 0 12px; }
#content h3 { font-size:1.1rem; margin:20px 0 8px; }
#content p { margin:8px 0; line-height:1.6; }
#content pre { background:#0d0d1a; padding:12px 16px; border-radius:8px; overflow-x:auto; font-size:0.8rem; line-height:1.4; margin:12px 0; border:1px solid var(--border); }
#content code { font-family:'SF Mono',monospace; font-size:0.85em; }
#content pre code { font-size:0.8rem; }
#content blockquote { border-left:3px solid var(--accent); margin:12px 0; padding:8px 16px; background:var(--hover); border-radius:0 6px 6px 0; }
#loading { text-align:center; padding:40px; color:var(--muted); }

#menu-btn { display:none; background:none; border:none; color:var(--text); font-size:1.2rem; cursor:pointer; padding:4px 8px; }
#sidebar.show { transform:translateX(0); }

@media (max-width:768px) {
  #sidebar { position:fixed; left:0; top:0; bottom:0; z-index:100; transform:translateX(-100%); transition:transform 0.25s; }
  #sidebar.show { transform:translateX(0); }
  #menu-btn { display:block; }
  #content { padding:16px; }
  #nav-top, #nav-bottom { padding:6px 12px; }
  .nav-btn { padding:4px 10px; font-size:0.8rem; }
}
</style>
</head>
<body>

<div id="sidebar">
  <h1>PSIV Guide & Walkthrough</h1>
  <div id="search"><input type="text" placeholder="Search sections..." id="search-input"></div>
  <div id="toc"></div>
</div>

<div id="main">
  <div id="nav-top">
    <button class="nav-btn" id="menu-btn" onclick="toggleSidebar()">☰</button>
    <button class="nav-btn" id="prev-btn" onclick="goPrev()">← Prev</button>
    <div id="breadcrumb"></div>
    <button class="nav-btn" id="next-btn" onclick="goNext()">Next →</button>
  </div>
  <div id="content"><div id="loading">Loading guide...</div></div>
  <div id="nav-bottom">
    <button class="nav-btn" onclick="goPrev()">← Prev</button>
    <div style="flex:1"></div>
    <button class="nav-btn" onclick="goNext()">Next →</button>
  </div>
</div>

<script>
let tocData = [];
let flatSections = [];
let currentIdx = -1;
let sidebarOpen = false;

function toggleSidebar() { sidebarOpen = !sidebarOpen; document.getElementById('sidebar').classList.toggle('show', sidebarOpen); }

async function loadToc() {
  const res = await fetch('guide/toc.json');
  tocData = await res.json();
  function flatten(nodes, depth) {
    for (const n of nodes) { flatSections.push({...n, depth}); if (n.children) flatten(n.children, depth+1); }
  }
  flatten(tocData, 0);
  renderToc(tocData);
  // Load initial section from hash or first
  const hash = location.hash.slice(1);
  const idx = hash ? flatSections.findIndex(s => s.num === hash) : -1;
  loadSection(idx >= 0 ? idx : 0);
}

function renderToc(nodes) {
  const el = document.getElementById('toc');
  el.innerHTML = nodes.map(n => 
    `<div class="toc-item toc-d${n.depth}" data-num="${n.num}" data-file="${n.file}" onclick="loadByNum('${n.num}')">${n.num}. ${n.title}</div>` +
    (n.children ? renderTocChildren(n.children) : '')
  ).join('');
}
function renderTocChildren(nodes) {
  return nodes.map(n =>
    `<div class="toc-item toc-d${n.depth}" data-num="${n.num}" data-file="${n.file}" onclick="loadByNum('${n.num}')">${n.num}. ${n.title}</div>` +
    (n.children ? renderTocChildren(n.children) : '')
  ).join('');
}

async function loadSection(idx) {
  if (idx < 0 || idx >= flatSections.length) return;
  currentIdx = idx;
  const s = flatSections[idx];
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').innerHTML = '<div id="loading">Loading...</div>';
  try {
    const res = await fetch('guide/' + s.file);
    const md = await res.text();
    document.getElementById('content').innerHTML = marked.parse(md);
    document.getElementById('loading').style.display = 'none';
    updateNav();
    highlightToc(s.num);
    document.getElementById('content').scrollTop = 0;
    location.hash = '#' + s.num;
    if (sidebarOpen) toggleSidebar();
  } catch(e) {
    document.getElementById('content').innerHTML = '<p>Error loading section.</p>';
  }
}

function loadByNum(num) {
  const idx = flatSections.findIndex(s => s.num === num);
  if (idx >= 0) loadSection(idx);
}

function goPrev() { if (currentIdx > 0) loadSection(currentIdx - 1); }
function goNext() { if (currentIdx < flatSections.length - 1) loadSection(currentIdx + 1); }

function updateNav() {
  const prev = document.getElementById('prev-btn');
  const next = document.getElementById('next-btn');
  prev.disabled = currentIdx <= 0;
  next.disabled = currentIdx >= flatSections.length - 1;
  const s = flatSections[currentIdx];
  // Build breadcrumb
  const parts = s.num.split('.');
  let crumb = '';
  for (let i = 1; i <= parts.length; i++) {
    const pn = parts.slice(0, i).join('.');
    const ps = flatSections.find(x => x.num === pn);
    if (ps && ps.num !== s.num) crumb += `<a href="#" onclick="loadByNum('${ps.num}')">${ps.num}. ${ps.title}</a> › `;
  }
  crumb += `<span>${s.num}. ${s.title}</span>`;
  document.getElementById('breadcrumb').innerHTML = crumb;
}

function highlightToc(num) {
  document.querySelectorAll('.toc-item').forEach(el => {
    el.classList.toggle('active', el.dataset.num === num);
  });
}

// Search
document.getElementById('search-input').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('.toc-item').forEach(el => {
    const text = el.textContent.toLowerCase();
    el.classList.toggle('hidden', q && !text.includes(q));
  });
});

// Keyboard nav
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft' && !e.target.closest('input')) goPrev();
  if (e.key === 'ArrowRight' && !e.target.closest('input')) goNext();
});

loadToc();
</script>
</body>
</html>
